<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AI Coach | ResumeAnalyzer</title>
        <script src="https://cdn.tailwindcss.com"></script>

        <script>
            tailwind.config = {
                theme:{
                    extend: { 
                        colors: {
                        navy: '#355872',
                        blue: '#7AAACE',
                        skyblue: '#9CD5FF',
                        cream: '#F7F8F0',
                        lightnavy:'#6389a5',
                        }
                    }
                }
            }
        </script>

        <style>
            .glass {
                background: rgba(255,255,255,0.7);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255,255,255,0.2);
            }
        </style>
    </head>

    <body class="bg-cream min-h-screen font-sans text-navy flex overflow-hidden">

        <aside id="sidebar" class="w-64 bg-navy text-white flex flex-col h-screen transition-all duration-300 relative z-50">
            <div class="p-6 flex items-center justify-between border-b border-white/10 mb-4">
                <h1 id="sidebar-logo" class="text-xl font-bold tracking-tighter truncate">ResumeAnalyzer</h1>

                <button onclick="toggleSidebar()" class="p-2 rounded-lg hover:bg-white/10 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-skyblue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>

            <nav class="flex-grow px-4 space-y-4 overflow-x-hidden">
                <a href="home.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/10 transition bg-white/5">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 text-skyblue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>

                    <span class="sidebar-text font-medium">Home</span>
                </a>

                <a href="resume.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/10 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 text-skyblue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>

                    <span class="sidebar-text font-medium">My Resume</span>
                </a>

                <a href="results.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/10 transition">
                   <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 text-skyblue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
                    </svg> 

                    <span class="sidebar-text font-medium">Job Search</span>
                </a>

                <a href="saved.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/10 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 text-skyblue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
                    </svg>

                    <span class="sidebar-text font-medium">Saved Jobs</span>
                </a>

                <a href="chatbot.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/10 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 text-skyblue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                    </svg>

                    <span class="sidebar-text font-medium text-white">AI Career Coach</span>
                </a>

                <div class="pt-4 pb-2">
                    <div class="h-px bg-white/10 w-full"></div>
                </div>

                <a href="help.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/10 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 text-skyblue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>

                    <span class="sidebar-text font-medium">Help Center</span>
                </a>
            </nav>
        </aside>

        <main class="flex-grow h-screen flex flex-col relative">
            <header class="p-8 border-b border-navy/5 bg-white/50 backdrop-blur-md">
                <h2 class="text-3xl font-bold text-navy">AI Career Coach</h2>
                <p class="text-navy/60">Ask me anything about your career path or resume!</p>
            </header>

            <div id="chat-container" class="flex-grow overflow-y-auto p-8 space-y-6 bg-white/30">
                <div class="flex gap-4 max-w-3xl">
                    <div class="w-10 h-10 rounded-xl bg-navy flex items-center justify-center text-skyblue shrink-0 shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>

                    <div class="glass p-5 rounded-2xl rounded-tl-none shadow-sm text-navy">
                        Hi! I'm your AI coach. How can I help you improve your profile today?
                    </div>
                </div>
            </div>

            <div class="p-8 bg-white/80 border-navy/10 backdrop-blur-xl">
                <form id="chat-form" class="max-w-4xl mx-auto flex gap-4">
                    <input type="text" id="user-input" autocomplete="off" placeholder="Type your question here..." class="flex-grow bg-cream border border-navy/10 rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-blue/50 shadow-inner">
                    
                    <button type="submit" class="bg-navy text-white px-8 py-4 rounded-2xl font-bold hover:bg-blue transition-all transform hover:scale-105 shadow-lg">
                        Send
                    </button>
                </form>
            </div>
        </main>

        <script src="./javascript/chatbot.js"></script>
        <script src="./javascript/home.js"></script>
    </body>
</html>
